<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>خلفية نقاط — Dori Yums</title>
<style>
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(70% 60% at 50% 40%, #1a1408 0%, #0a0805 70%);
  }
  /* طبقة النقاط الذهبية فقط */

    position:fixed; inset:0;
    background-image:radial-gradient(#E8C547 1px, transparent 1px);
    background-size:22px 22px;
    opacity:.10;
  }
</style>
</head>
<body>
  <div class="dots"></div>
</body>
