<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>غير متصل — Dori Yums</title>
<link rel="icon" href="logo.webp" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Tajawal',-apple-system,system-ui,sans-serif;
    background:#FBF4E4;
    color:#3A1F1F;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
    background-image:radial-gradient(circle at 10% 20%,rgba(224,149,158,.08),transparent 40%),radial-gradient(circle at 90% 80%,rgba(212,175,55,.08),transparent 50%);
  }
  .card{
    max-width:420px;text-align:center;
    padding:40px 28px;
    background:linear-gradient(155deg,#FFFAEC,#F5EBD1);
    border:1px solid rgba(224,149,158,.4);
    border-radius:20px;
    box-shadow:0 24px 60px rgba(156,86,102,.18);
  }
  .logo{
    width:80px;height:80px;border-radius:50%;
    margin:0 auto 24px;
    background:url('logo.webp') center/contain no-repeat;
    filter:drop-shadow(0 4px 12px rgba(156,86,102,.25));
    animation:gentle 4s ease-in-out infinite;
  }
  @keyframes gentle{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
  h1{
    font-family:'Cormorant Garamond',serif;
    font-size:28px;font-weight:500;color:#3A1F1F;
    letter-spacing:.02em;margin-bottom:8px;
  }
  .eyebrow{
    color:#9C5666;font-size:11px;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px;
    display:block;
  }
  p{color:#7A5C5C;font-size:15px;line-height:1.7;margin-bottom:24px;}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:12px 28px;
    background:#9C5666;color:#FFFAEC;
    border:0;border-radius:10px;cursor:pointer;
    font-family:inherit;font-size:14px;font-weight:600;
    text-decoration:none;
    box-shadow:0 8px 20px rgba(156,86,102,.3);
    transition:transform .2s ease,background .2s ease;
  }
  .btn:hover{background:#7d4252;transform:translateY(-1px);}
  .btn svg{width:16px;height:16px;}
  .hint{margin-top:16px;color:#9C5666;font-size:12px;opacity:.75;}
</style>
</head>
<body>
  <div class="card">
    <div class="logo" aria-hidden="true"></div>
    <span class="eyebrow">Dori Yums · Hors-ligne</span>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>يبدو أن اتصالك انقطع. تحقّق من شبكتك ثم أعد المحاولة — صفحتنا تعمل بدون انترنت بعد أوّل زيارة.</p>
    <button class="btn" type="button" onclick="location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-9 9c-2.5 0-4.78-1.02-6.42-2.66"/><path d="M3 12a9 9 0 0 1 9-9c2.5 0 4.78 1.02 6.42 2.66"/><polyline points="21 3 21 9 15 9"/><polyline points="3 21 3 15 9 15"/></svg>
      أعد المحاولة
    </button>
    <div class="hint">+213 0 00 00 00 00 · الجزائر</div>
  </div>
</body>
</html>
